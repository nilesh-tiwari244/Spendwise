<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#fafafa" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>SpendWise - Personal Expense Tracker</title>
    <style>
      body {
        margin: 0;
        background-color: #fafafa;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #initial-loader {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #fafafa;
        color: #18181b;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 4px solid #e4e4e7;
        border-top-color: #18181b;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .loader-text {
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #a1a1aa;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse { 50% { opacity: .5; } }
    </style>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          var target = window;
          var prop = 'fetch';
          var descriptor = Object.getOwnPropertyDescriptor(target, prop);
          
          // If not found on window, check prototype
          if (!descriptor) {
            target = Object.getPrototypeOf(window);
            descriptor = Object.getOwnPropertyDescriptor(target, prop);
          }

          if (descriptor && descriptor.get && !descriptor.set) {
            var originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('SpendWise: Fetch fix failed', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loader-text">Waking up database...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
